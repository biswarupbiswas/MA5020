site_name: MA5020 — Computational Methods for Fluid Flow
site_url: https://biswarupbiswas.github.io/MA5020

repo_url: https://github.com/biswarupbiswas/MA5020

copyright: Copyright &copy; 2026 Biswarup Biswas

theme:
  name: material
  custom_dir: overrides
  logo: assets/CMFF.png
  favicon: assets/CMFF.png
  palette:
    scheme: default
    primary: deep-orange
    accent: orange
  features:
    - navigation.sections
    - content.code.copy
    - footer.hide.generator

plugins:
  - search
  - mkdocs-jupyter:
      execute: false
      include_source: true

nav:
  - Home: index.md
  - Syllabus: syllabus.md
  - Lectures: lectures.md
  - Tutorials: tutorials.md
  - Assignments: assignments.md
  - Notebooks:
      - Lab 1: notebooks/lab1.ipynb
      
markdown_extensions:
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences
  - pymdownx.details
  - attr_list

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/biswarupbiswas
    - icon: fontawesome/solid/envelope
      link: mailto:biswarup.biswas@mahindrauniversity.edu.in
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/dr-biswarup-biswas
